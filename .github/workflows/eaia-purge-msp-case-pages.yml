name: EAIA purge MSP case pages before clean reupload
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove MSP case pages and reset MSP demos index
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          pages = Path('pages')
          keep = {
              'msp-demos.html',
              'msp-compliance.html',
              'msp-onboarding.html',
              'msp-validation.html',
              'factory.html',
              'armees-eaia.html',
              'agence-marketing-ia.html',
              'eaia-apercu-besoin-client.html',
              'iasm-sante-mentale.html',
              'dam-design-interieur.html',
              'trad-surveillance-marches.html',
              'edu-services.html',
              'nea-writing.html',
              'test-factory-original.html'
          }

          prefixes = (
              'eaia_case', 'eaia-case', 'eaia_casepage',
              'msp-case', 'msp_case', 'msp-capacite',
              'eaia-msp-resolution', 'eaia_msp', 'msp-demo'
          )

          deleted = []
          for p in sorted(pages.glob('*.html')):
              name = p.name
              low = name.lower()
              if name in keep:
                  continue
              if low.startswith(prefixes) or ('case' in low and 'msp' in low):
                  p.unlink()
                  deleted.append(name)

          index = pages / 'msp-demos.html'
          if index.exists():
              s = index.read_text(encoding='utf-8', errors='ignore')
              empty_cards = '<div class="pro-card"><div class="card-top"><div class="card-n">CAS</div><div class="badge">À venir</div></div><div class="card-title">Pages de cas en réimportation</div><div class="card-sub">Base MSP nettoyée</div><div class="card-desc">Les anciennes pages de cas ont été retirées pour repartir sur une source propre. Les nouvelles pages anonymisées seront réajoutées ici après import.</div><span class="card-link">En attente →</span></div>'
              pattern = r'(<div class="card-grid">\s*)(.*?)(\s*</div></section>\s*<section class="quote-section">)'
              s = re.sub(pattern, r'\1' + empty_cards + r'\3', s, count=1, flags=re.S)
              s = re.sub(r'<div class="summary-n">\d+</div><div class="summary-l">[^<]*Cas[^<]*</div>', '<div class="summary-n">0</div><div class="summary-l">Cas actifs</div>', s, count=1)
              s = re.sub(r'<div class="summary-n">\d+</div><div class="summary-l">[^<]*(?:Pages analysées|Pages du dossier|Nouvelles pages)[^<]*</div>', '<div class="summary-n">0</div><div class="summary-l">Pages de cas à réimporter</div>', s, count=1)
              s = re.sub(r'<div class="summary-n">\d+</div><div class="summary-l">[^<]*Doublon[^<]*</div>', '<div class="summary-n">0</div><div class="summary-l">Doublon affiché</div>', s, count=1)
              s = s.replace('Cette page expose les cas MSP anonymisés du dossier /pages avec une seule carte par intervention logique.', 'Cette page servira d’index officiel pour les nouvelles pages de cas MSP anonymisées qui seront réimportées dans le dossier /pages.')
              s = s.replace('L’index utilise uniquement les pages de cas anonymisées du dossier /pages. Les doublons d’intervention sont masqués et chaque carte reçoit une description distincte pour éviter l’effet de répétition.', 'Les anciennes pages de cas MSP ont été retirées afin de repartir sur une base propre. Les nouvelles pages anonymisées seront ajoutées au dossier /pages, puis indexées ici sans doublons.')
              index.write_text(s, encoding='utf-8')

          print('Deleted MSP case pages:')
          for name in deleted:
              print('-', name)
          print(f'Total deleted: {len(deleted)}')
          PY
      - name: Commit purge
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A pages
          git commit -m "Purge MSP case pages before clean reupload"
          git push
